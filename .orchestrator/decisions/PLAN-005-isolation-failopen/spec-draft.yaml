id: SPEC-017
title: Refuse dispatch when D5 isolation is unavailable
risk_class: high
objective: >-
  Implement authorized PLAN-005 revision 4 with binding amendments A2 and A3:
  select one immutable execution decision before durable dispatch state, require
  every execution-capable consumer to use that decision without downgrade,
  refuse when D5 is unavailable unless root-backed single-use break-glass
  redemption succeeds, scrub break-glass authorization from all subsequent
  child environments, and make the live D5 canary drill non-vacuous.
in_scope:
  - scripts/dispatch.py
  - tests/isolation_fail_closed.sh
  - tests/worker_isolation.sh
  - CLAUDE.md
out_of_scope:
  - Installing or modifying root-owned issuance or redemption helpers
  - Installing or modifying sudoers policy
  - Creating or modifying the root-held secret
  - Creating or modifying the root-owned redemption ledger or its parent directory
  - Creating or modifying /srv/codexwork paths, ownership, or ACLs
  - Redesigning scripts/setup-worker-user.sh or the established D5 systemd services
  - Implementing a same-user sandbox or hardened fallback
  - Changing spec semantics, gate order, branch targets, merge authority, or review policy
  - Automatically merging this trust-critical change
needs_network: false
acceptance_criteria:
  - >-
    1. Before implementation, the executor re-inventories scripts/dispatch.py
    at the implementation HEAD, starting from the execution sites identified
    by the authorized plan at lines 527, 540, 623, 717, 860, and 946, and
    accounts for initial worker launch, retries, remediation, primary TEST,
    both regression runs, tool-capable review, and hook-capable post-test
    commands; if that topology has materially changed, implementation stops
    rather than partially applying the stale design.
  - >-
    2. scripts/dispatch.py defines exactly two launchable modes, ISOLATED and
    UNISOLATED_EXPOSURE, and represents the selected mode with an immutable
    decision object that downstream consumers cannot reinterpret as AUTO,
    fallback, or a mutable isolation boolean.
  - >-
    3. The frozen execution decision is selected after complete spec parsing
    and schema validation but before claim_slot, attempt-directory creation,
    branch or worktree creation, or execution of worker-authored code;
    isolation_available() is evaluated exactly once per dispatch for this
    selection.
  - >-
    4. The same frozen decision is passed explicitly, with no default, to
    worktree-root selection and every execution site corresponding to the
    audited scripts/dispatch.py locations 527, 540, 623, 717, 860, and 946,
    including initial worker launch, retries, remediation, primary TEST, both
    regression-gate runs, tool-capable review, and every hook-capable or
    process-capable consumer found by the inventory.
  - >-
    5. No consumer outside the preflight selector calls
    isolation_available(), recalculates isolation, infers another mode, or
    downgrades from ISOLATED; an isolated launch, TEST, regression, retry,
    remediation, review, cleanup, or worktree failure terminates the attempt
    without invoking UNISOLATED_EXPOSURE.
  - >-
    6. When D5 isolation is unavailable and ORCH_ALLOW_UNISOLATED is absent or
    differs from the literal string 1, dispatch exits nonzero with a distinct
    preflight-refusal classification after valid-spec processing, without
    claiming a slot, creating an attempt directory, branch, or worktree, or
    launching worker-controlled code.
  - >-
    7. When D5 isolation is unavailable, literal
    ORCH_ALLOW_UNISOLATED=1 without the exact invocation attempt ID and a
    valid opaque break-glass token refuses with the same no-state and
    no-worker-execution guarantees.
  - >-
    8. Break-glass is refused before durable attempt state or worker-controlled
    execution when the root-owned redemption helper, root-held secret,
    protected ledger, or exact scoped-sudoers redemption permission is absent,
    inaccessible, malformed, rejects the request, or returns malformed or
    unexpected output; dispatch provides no operator-owned validator, ledger,
    permissive sudo alternative, or same-user fallback.
  - >-
    9. The unprivileged redemption client binds its request to the canonical
    spec digest, exact invocation attempt ID, and base SHA, treats the bearer
    token as opaque, invokes only the configured narrow redemption command,
    supplies no caller-controlled current-time, now, issue-time, expiry
    override, ledger path, shell command, or arbitrary root action, and
    strictly parses a non-secret successful receipt before selecting
    UNISOLATED_EXPOSURE.
  - >-
    10. Tests prove that malformed authorization, binding mismatches,
    invalid helper output, helper failure, an expired-token response,
    replay rejection, and concurrent-redeemer rejection all leave dispatch
    refused without durable attempt state or worker-controlled execution;
    these tests exercise the dispatch-side protocol with controlled helper
    substitutes and do not claim to validate uninstalled root infrastructure.
  - >-
    11. When D5 is healthy, dispatch always selects ISOLATED even if
    break-glass variables and a token are supplied, does not invoke redemption,
    and preserves the supplied token as unredeemed.
  - >-
    12. Binding amendment A3 is implemented verbatim: break-glass
    variables/tokens are removed from EVERY child-process environment after
    mode selection, including the healthy-D5 case where a supplied token goes
    unredeemed (an unredeemed token must never leak into a worker/test
    environment). Tests inspect child environments for isolated and exposure
    worker, TEST, regression, review, retry, remediation, and other
    process-capable paths and find no ORCH_ALLOW_UNISOLATED,
    ORCH_UNISOLATED_ATTEMPT_ID, or ORCH_UNISOLATED_TOKEN.
  - >-
    13. UNISOLATED_EXPOSURE retains only the established same-user execution
    mechanics and is never described as isolated, sandboxed, hardened, or
    credential-safe; its stderr warning states that worker, TEST, regression,
    review, retry, and remediation code can access all operator-readable
    credentials and host state and can communicate over the operator's
    available channels.
  - >-
    14. A launched exposure attempt records execution mode, attempt ID,
    non-secret token fingerprint or ID, authenticated issuer, reason,
    issue and expiry timestamps, redemption receipt identifier, and the
    root-owned ledger location in existing launch or evidence metadata,
    while the bearer token, root secret, keyed authenticator, and reusable
    secret values are absent from diagnostics, evidence, manifests, and logs.
  - >-
    15. Refusal diagnostics state that D5 is unavailable, no worker-controlled
    code was launched, scripts/setup-worker-user.sh is the recovery action,
    ORCH_ALLOW_UNISOLATED=1 alone is insufficient, a fresh token requires
    explicit interactive issuance and root-backed atomic redemption, and
    missing privileged infrastructure makes break-glass unavailable, without
    printing authorization values or secret material.
  - >-
    16. tests/isolation_fail_closed.sh uses a schema-valid dispatch fixture,
    proves it reached the intended post-validation preflight branch, snapshots
    attempt directories, slot state, branches, and worktrees, and asserts
    that unavailable D5 without valid break-glass authorization exits nonzero,
    leaves those snapshots unchanged, and emits none of the worker, TEST,
    regression, review, retry, or remediation launch markers.
  - >-
    17. tests/isolation_fail_closed.sh includes positive controls that reach a
    launch through healthy D5 and through an accepted fresh-redemption helper
    response, instruments isolation_available() to fail if called more than
    once, proves all execution consumers observe the same decision, and proves
    injected isolated-path failures never invoke exposure-mode markers.
  - >-
    18. The regression proof fails against the current base behavior because
    its valid D5-unavailable fixture reaches the existing same-user launch
    marker, and passes against the candidate because dispatch refuses before
    that marker and before durable state creation.
  - >-
    19. tests/worker_isolation.sh dynamically obtains the invoking operator's
    passwd home for id -u, creates and positively reads a harmless random
    protected canary there, creates a separate worker-readable random control
    token, verifies both fixtures before launch, uses no hard-coded
    /home/val path, and removes all fixtures through EXIT and interrupt cleanup
    whose failure makes the drill fail.
  - >-
    20. The live canary passes both exact paths through one actual isolated
    service invocation, one fixed probe implementation, one executable, and
    one argument/path-transfer mechanism; that probe must successfully read
    and byte-compare the control token before attempting the exact protected
    canary path.
  - >-
    21. Binding amendment A2 is implemented verbatim:
    CONTROL_READ_SUCCEEDED must be verifiably dependent on the RANDOM CONTENTS
    of the control token (the probe must echo/hash the token's random value,
    compared by the controller), never on marker text alone. The controller
    rejects a marker whose returned value or digest does not match the random
    control contents it generated.
  - >-
    22. The canary accepts only the ordered same-invocation sequence
    CONTROL_READ_SUCCEEDED, PROTECTED_PATH_ATTEMPTED bound to the exact
    expected protected path or its verified collision-resistant digest, and
    DENIAL_OBSERVED for the expected permission-denied classification;
    missing or reordered markers, ENOENT, successful protected reads,
    unexpected errors, quoting or argument failures, missing tools, command
    failure, service failure, timeout, or cleanup failure makes the drill fail.
  - >-
    23. tests/worker_isolation.sh contains separate skip-control-read,
    broken-command-or-executable, and wrong-path sabotage cases, and each case
    is asserted to fail red without producing an accepted isolation
    confirmation; printing marker text without reading and proving the random
    control contents cannot pass.
  - >-
    24. Missing D5, an unavailable required live fixture, an unexecuted control
    read, an unexecuted protected-path attempt, a probe or service failure, or
    an early return is reported as failure or explicit INCOMPLETE and is never
    represented as the paired high-assurance environment validation passing.
  - >-
    25. CLAUDE.md documents the exact token-bearing dispatch variables,
    explicit interactive issuance workflow, authenticated invocation
    bindings, maximum fifteen-minute validity, trusted root-helper clock,
    single-use redemption semantics, root-owned append-only ledger,
    full-exposure warning, recovery guidance, prohibition on persistent
    break-glass, required fresh authorization per use, and refusal-only
    behavior while the operator prerequisites are absent.
  - >-
    26. python3 -m py_compile scripts/dispatch.py,
    bash tests/isolation_fail_closed.sh, bash tests/worker_isolation.sh in a
    fully provisioned D5 validation environment, and ./scripts/test all
    complete with the outcomes required by their environment contracts.
test_command: ./scripts/test
regression_command: bash tests/isolation_fail_closed.sh
regression_test_paths:
  - tests/isolation_fail_closed.sh
context:
  - >-
    This specification instantiates authorized PLAN-005 revision 4 plus
    binding amendments A2 and A3, authorized plan digest
    dae8ade156257c7cb762182ccbcdc37d7ff3c49aee803c6791196149818dd82d.
    Silent changes to that authorized intent are not permitted.
  - >-
    OPERATOR PREREQUISITE: outside the sandboxed worker PR, root must install
    and validate the root-owned interactive issuance helper, root-owned atomic
    redemption helper, root-held authentication secret, narrowly scoped
    redemption-only sudoers entry, and root-owned append-only redemption
    ledger whose file and parent directory the operator UID cannot modify,
    truncate, replace, rename, unlink, or delete.
  - >-
    OPERATOR PREREQUISITE: issuance authority must remain distinct from
    noninteractive redemption authority and require a controlling terminal
    plus fresh interactive sudo authentication. Both helpers must use their
    own trusted host-clock reads; the redemption interface must reject
    caller-supplied current-time or now parameters and atomically authenticate,
    check replay, durably append, and only then return a non-secret receipt.
  - >-
    OPERATOR PREREQUISITE: the D5-available validation host must have the
    codex-worker account, hardened systemd services, scoped worker sudo policy,
    ACL layout, and /srv/codexwork/worktrees infrastructure established by the
    existing operator setup procedure. Creating or repairing those root-owned
    facilities is not worker work.
  - >-
    Until every privileged break-glass prerequisite is installed and
    validated, break-glass is UNAVAILABLE and the worker implementation must
    fail closed with refusal only. Tests may substitute controlled helper
    responses to verify the unprivileged dispatch protocol, but such tests do
    not satisfy the operator's real-root-helper acceptance.
  - >-
    Release acceptance remains an operator responsibility and requires
    machine-readable reports from both a real D5-unavailable userns-restricted
    environment and a real D5-available environment, bound to the same
    implementation commit and test digest. The root-helper authorization,
    trusted-clock expiry-bypass, concurrent redemption, forge/erase/replay,
    ledger-protection, and fresh-interactive-issuance exercises must use the
    installed privileged infrastructure; simulations or a refusal-only report
    are INCOMPLETE, not PASS.
