id: SPEC-014
title: Risk-weighted delegation report (standalone, read-only)
risk_class: low
depends_on: []
objective: >
  A standalone read-only script scripts/delegation_report.py reports how work is split between
  delegated Codex worker attempts and direct-Claude control-plane commits, broken down by work
  class — NEVER as a single delegation-ratio number (a single ratio is a perverse target; see
  CLAUDE.md "Execution split" invariant 4). It reads .orchestrator/attempts/*/*/ evidence
  (launch.json + result.json) and the git merge history of the current branch, and prints one JSON
  object to stdout. It must not import scripts/dispatch.py and must not write anywhere.
in_scope:
  - scripts/delegation_report.py
  - tests/delegation_report.sh
out_of_scope:
  - scripts/dispatch.py
  - scripts/lib/**
  - .orchestrator/**
  - .github/**
  - specs/**
acceptance_criteria:
  - "scripts/delegation_report.py prints a single JSON object with keys: codex_attempts_by_risk_class (object mapping low/default/high to counts of worker attempts; risk class resolved from the attempt's spec file <specs-dir>/<spec_id>.yaml, and attempts whose spec file or risk_class is missing count under 'unclassified'), codex_attempts_total, codex_merged_total (attempts whose result.json has merged true), claude_direct_merges (count of merge commits on the current branch whose merged branch name does NOT start with codex/), codex_branch_merges (merge commits whose branch name starts with codex/), and window (description of what was scanned)."
  - "The JSON output contains NO field named delegation_ratio and no other single-scalar ratio of delegated to direct work."
  - "With a missing or empty .orchestrator/attempts directory and/or no merge commits, the script still exits 0 and prints a valid JSON object with zero counts."
  - "The script accepts optional --attempts-dir, --specs-dir, and --repo arguments overriding the attempts directory, specs directory, and git repository to scan (for tests), is read-only (creates/modifies no files), and does not import or execute scripts/dispatch.py."
  - "tests/delegation_report.sh constructs a synthetic attempts directory (at least: one low-risk merged attempt, one default-risk unmerged attempt, one attempt directory missing result.json) with matching synthetic spec files, plus a throwaway git repo with at least one codex/* merge and one non-codex merge, asserts the reported counts match, asserts the empty-input case, and exits 0 when all assertions pass."
test_command: "bash tests/delegation_report.sh"
hard_ceiling_hours: 2
needs_network: false
context:
  - tests/dispatch_gate4.sh
  - CLAUDE.md
